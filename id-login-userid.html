<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统一身份认证平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #151522 50%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(0, 200, 255, 0.2),
                transparent 30%
            );
            animation: rotate 10s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .logo p {
            color: #a0a0c0;
            font-size: 1rem;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 28px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #b0b0e0;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #00d2ff;
            font-size: 1.2rem;
            z-index: 2;
        }

        .form-input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #fff;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0a0c0;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 2;
        }

        .login-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 35px 0;
            color: #a0a0c0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .divider span {
            padding: 0 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .auth-methods {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .auth-method {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 18%;
        }

        .auth-method:hover {
            transform: translateY(-5px);
        }

        .method-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .auth-method:hover .method-icon {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(0, 210, 255, 0.5);
            box-shadow: 0 8px 16px rgba(0, 210, 255, 0.2);
        }

        .method-label {
            font-size: 0.85rem;
            color: #b0b0e0;
            text-align: center;
            font-weight: 500;
        }

        .phone .method-icon { color: #34c759; }
        .email .method-icon { color: #ff9500; }
        .wechat .method-icon { color: #07c160; }
        .alipay .method-icon { color: #1677ff; }
        .blockchain .method-icon { color: #8a2be2; }

        .footer-links {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: #a0a0c0;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #00d2ff;
            text-decoration: underline;
        }

        .hint {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #a0a0c0;
        }

        .hint a {
            color: #00d2ff;
            text-decoration: none;
        }

        .hint a:hover {
            text-decoration: underline;
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-top: 15px;
            font-size: 0.95rem;
            color: #b0b0e0;
        }

        .remember-me input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: #00d2ff;
        }

        .active-method {
            position: relative;
        }

        .active-method::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00d2ff;
            box-shadow: 0 0 10px #00d2ff;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 40px 25px;
                border-radius: 20px;
            }
            .auth-methods {
                flex-wrap: wrap;
                justify-content: center;
                gap: 20px;
            }
            .auth-method {
                width: 45%;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>用户ID登录</h1>
            <p>-- 统一身份认证平台 --</p>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label class="form-label">用户ID</label>
                <div class="input-wrapper">
                    <i class="input-icon fas fa-user"></i>
                    <input type="text" class="form-input" id="userid" placeholder="输入你的用户ID" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">密码</label>
                <div class="input-wrapper">
                    <i class="input-icon fas fa-lock"></i>
                    <input type="password" class="form-input" id="password" placeholder="输入你的密码" required>
                    <i class="password-toggle fas fa-eye" id="togglePassword"></i>
                </div>
                <div class="hint"><a href="#"><i class="fas fa-key"></i> 忘记密码?</a ></div>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">记住我 (30天内自动登录)</label>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> 登录
            </button>
        </form>

        <div class="divider">
            <span>其它登录方式</span>
        </div>

        <div class="auth-methods">
            <div class="auth-method phone active-method" data-method="phone">
                <div class="method-icon">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <span class="method-label">手机</span>
            </div>
            <div class="auth-method email" data-method="email">
                <div class="method-icon">
                    <i class="fas fa-envelope"></i>
                </div>
                <span class="method-label">Email</span>
            </div>
            <div class="auth-method wechat" data-method="wechat">
                <div class="method-icon">
                    <i class="fab fa-weixin"></i>
                </div>
                <span class="method-label">微信</span>
            </div>
            <div class="auth-method alipay" data-method="alipay">
                <div class="method-icon">
                    <i class="fab fa-alipay"></i>
                </div>
                <span class="method-label">支付宝</span>
            </div>
            <div class="auth-method blockchain" data-method="blockchain">
                <div class="method-icon">
                    <i class="fas fa-link"></i>
                </div>
                <span class="method-label">DID</span>
            </div>
        </div>

        <div class="footer-links">
            <a href="#"><i class="fas fa-question-circle"></i> 帮助中心</a>
            <a href="#"><i class="fas fa-user-plus"></i> 注册新账号</a>
            <a href="#"><i class="fas fa-shield-alt"></i> 隐私政策</a >
        </div>
    </div>

    <script>
        // 切换密码可见性
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        });

        // 切换登录方式
        const authMethods = document.querySelectorAll('.auth-method');
        authMethods.forEach(method => {
            method.addEventListener('click', () => {
                // 移除所有active
                authMethods.forEach(m => m.classList.remove('active-method'));
                // 添加active
                method.classList.add('active-method');

                const methodType = method.getAttribute('data-method');
                let methodTypeText = ''
                if(methodType === 'phone') {
                    methodTypeText = '手机'
                }else if(methodType === 'email') {
                    methodTypeText = 'Email'
                }else if(methodType === 'wechat') {
                    methodTypeText = '微信'
                }else if(methodType === 'alipay') {
                    methodTypeText = '支付宝'
                }else if(methodType === 'blockchain') {
                    methodTypeText = 'DID'
                }
                console.log(`切换到 ${methodTypeText} 登录`);

                // 跳转到对应的登录页面
                if (methodType !== 'userid') {
                    // alert(`切换到 ${methodType} 登录`);
                    Swal.fire({
                        title: '提示', // 这里可以自定义标题
                        text: `切换到 ${methodTypeText} 登录`,
                        icon: 'warning',
                        confirmButtonText: '知道了',
                        background: '#1a1a2e', // 可以匹配你页面的深色背景
                        color: '#fff'
                    });
                    // window.location.href = `/${methodType}-login.html`;
                }
            });
        });

        // 表单提交：登录
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const userid = document.getElementById('userid').value.trim();
            const password = document.getElementById('password').value.trim();
            const submitBtn = document.querySelector('.login-btn');
            const originalText = submitBtn.innerHTML;

            if (!userid) {
                // alert('请输入用户ID');
                Swal.fire({
                    title: '提示', // 这里可以自定义标题
                    text: '请输入用户ID',
                    icon: 'warning',
                    confirmButtonText: '知道了',
                    background: '#1a1a2e', // 可以匹配你页面的深色背景
                    color: '#fff'
                });
                return;
            }

            if (!password || password.length < 6) {
                Swal.fire({
                    title: '提示',
                    text: '密码至少需要6个字符',
                    icon: 'warning',
                    confirmButtonText: '知道了',
                    background: '#1a1a2e',
                    color: '#fff'
                });
                return;
            }

            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 认证中...';
            submitBtn.disabled = true;
            
            // Simulate API call
            setTimeout(() => {
                submitBtn.innerHTML = '<i class="fas fa-check"></i> 登录成功';
                submitBtn.style.background = 'linear-gradient(90deg, #34c759, #2ecc71)';
                
                setTimeout(() => {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                    submitBtn.style.background = 'linear-gradient(90deg, #00d2ff, #3a7bd5)';
                }, 2000);
            }, 1500);
        });
    </script>
</body>
</html>
