<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅店前台快捷工作站 | 虚空印象</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <!-- 自定义样式与动效 -->
    <style>
        :root {
            /* 深渊基底 */
            --bg-base: #050505;
            --bg-surface: rgba(20, 20, 20, 0.4);
            /* 赛博极光 */
            --accent-cyan: #00F3FF;
            --accent-pink: #FF003C;
            --accent-amber: #FFB000;
            --accent-green: #00FF9D;
            --accent-blue: #00A3FF;
            --accent-purple: #B400FF;
            /* 文本层级 */
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.60);
            --text-muted: rgba(255, 255, 255, 0.30);

            /* 矩阵元素颜色（从截图提取） */
            --matrix-dark: #111110;
            --matrix-teal: #368A7C;
            --matrix-gray: #425A55;
            --matrix-light: #A09F9F;
            --matrix-white: #E0E0E0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        /* 星空背景 */
        .cosmos-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
            overflow: hidden;
        }
        .moon {
            position: absolute;
            top: 5%;
            left: 5%;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                #F8F8FF 15%, 
                #E6E6FA 25%, 
                #D3D3D3 40%, 
                transparent 70%);
            box-shadow: 
                0 0 30px rgba(248, 248, 255, 0.4),
                0 0 60px rgba(230, 230, 250, 0.2),
                inset 0 0 20px rgba(0, 0, 0, 0.1);
            filter: blur(0.3px);
            animation: moon-glow 8s ease-in-out infinite alternate;
            z-index: 5;
        }
        .sun {
            position: absolute;
            top: 5%;
            right: 5%;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, 
                #FFD700 15%, 
                #FFA500 35%, 
                #FF4500 60%, 
                transparent 85%);
            box-shadow: 
                0 0 40px rgba(255, 215, 0, 0.6),
                0 0 80px rgba(255, 165, 0, 0.3),
                0 0 120px rgba(255, 69, 0, 0.15);
            filter: blur(0.8px);
            animation: sun-pulse 12s infinite alternate;
            z-index: 5;
        }
        .time-ruler {
            position: absolute;
            top: calc(12% - 10px);
            left: 15%;
            width: 70%;
            height: 30px;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.3), transparent);
            background-position: 0 50%;
            background-size: 100% 2px;
            background-repeat: no-repeat;
            padding: 0;
        }
        .time-tick {
            width: 1px;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            position: absolute;
            bottom: 50%;
            z-index: 2;
        }
        .time-tick.hour {
            height: 10px;
            background: rgba(0, 243, 255, 0.5);
            z-index: 3;
        }
        .current-time-marker {
            position: absolute;
            top: -30px;
            transform: translateX(-50%);
            background: var(--bg-surface);
            border: 1px solid var(--accent-pink);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            white-space: nowrap;
            box-shadow: 0 0 20px var(--accent-pink);
            animation: pulse 2s infinite;
        }
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite var(--delay);
        }
        .nebula {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 20, 255, 0.05) 0%, transparent 70%);
            filter: blur(40px);
            animation: nebula-drift 60s infinite linear;
        }
        /* 标题 */
        .main-title {
            text-align: center;
            margin-top: 240px;
            margin-bottom: 40px;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: rgba(80, 80, 80, 0.9);
            -webkit-text-stroke: 1px rgba(120, 120, 120, 0.7);
            text-stroke: 1px rgba(120, 120, 120, 0.7);
            text-shadow: 0 0 15px rgba(80, 80, 80, 0.2);
            animation: title-glow 4s ease-in-out infinite alternate;
        }
        /* 仪表盘容器 */
        .dashboard-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto 60px;
            padding: 0 20px;
            height: 320px;
            position: relative;
            overflow: visible;
        }
        .dashboard-scroll {
            display: flex;
            gap: 12px;
            padding: 20px;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        .dashboard-scroll::-webkit-scrollbar {
            display: none;
        }
        .dashboard-card {
            flex: 0 0 280px;
            height: 260px;
            background: var(--bg-surface);
            backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border-radius: 0;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: center center;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .dashboard-card:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.2);
            transform: scale(1.05);
        }
        .card-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent-cyan);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            padding-bottom: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            flex-grow: 1;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid var(--accent-cyan);
            min-width: 0; /* 允许子元素收缩 */
        }
        .stat-item > span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stat-item > span:first-child {
            flex: 1;
            margin-right: 8px;
        }
        .stat-item > .stat-value {
            flex-shrink: 0;
        }
        .stat-item.warning {
            border-left-color: var(--accent-amber);
        }
        .stat-item.alert {
            border-left-color: var(--accent-pink);
        }
        .stat-item.success {
            border-left-color: var(--accent-green);
        }
        .stat-item.info {
            border-left-color: var(--accent-blue);
        }
        .stat-item.other {
            border-left-color: var(--accent-purple);
        }
        .stat-value {
            font-weight: bold;
            font-size: 1.2rem;
        }
        /* 仪表盘导航 */
        .dashboard-nav {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 20px;
        }
        .dashboard-arrows {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }
        .dashboard-arrow {
            pointer-events: auto;
            width: 48px;
            height: 48px;
            background: rgba(20, 20, 20, 0.3);
            backdrop-filter: blur(8px) saturate(120%);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-cyan);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .dashboard-arrow:hover {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
            transform: scale(1.1);
        }
        .dashboard-arrow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: var(--text-muted);
            color: var(--text-muted);
        }
        .dashboard-arrow:disabled:hover {
            background: rgba(20, 20, 20, 0.3);
            border-color: var(--text-muted);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transform: none;
        }
        .dashboard-dots {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        .dashboard-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(0, 243, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .dashboard-dot:hover {
            background: rgba(0, 243, 255, 0.4);
            border-color: var(--accent-cyan);
        }
        .dashboard-dot.active {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.8);
        }
        /* 房态矩阵 */
        .room-matrix-container {

            max-width: 1400px;
            margin: 0 auto 80px;
            padding: 0 20px;
        }
        .floor-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;

            justify-content: flex-start;
        }
        .floor-title {
            width: 100%;
            font-size: 1.8rem;
            color: var(--accent-cyan);
            margin-bottom: 16px;
            padding-left: 10px;
            border-left: 4px solid var(--accent-pink);
        }
        .room-cell {
            flex: 0 0 130px;
            height: 130px;
            background: var(--matrix-dark);
            border: 1px solid var(--accent-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            border-radius: 0;
            transform-origin: center center;
            color: var(--matrix-white);
        }
        .room-cell.empty {
            border-color: var(--accent-cyan);
            background: rgba(0, 243, 255, 0.1);
        }
        .room-cell.occupied {
            border-color: var(--accent-blue);
            background: rgba(0, 163, 255, 0.1);
        }
        .room-cell.dirty {
            border-color: var(--accent-amber);
            background: rgba(255, 176, 0, 0.1);
        }
        .room-cell.cleaned {
            border-color: var(--accent-green);
            background: rgba(0, 255, 157, 0.1);
        }
        .room-cell.maintenance {
            border-color: var(--accent-purple);
            background: rgba(180, 0, 255, 0.1);
        }
        .room-cell.financial-issue {
            border-color: var(--accent-pink);
            background: rgba(255, 0, 60, 0.1);
        }
        .room-cell:hover {
            transform: scale(1.1);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
        }
        .room-number {
            position: absolute;
            top: 9px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 1.3rem;
            z-index: 2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .room-type, .room-status, .checkout-time {
            line-height: 1.2;
            text-align: center;
            position: absolute;
            width: 100%;
            left: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .room-type {
            top: 38px;
            color: var(--matrix-teal);
            font-size: 1.0rem;
        }
        .room-status {
            top: 67px;
            color: var(--matrix-white);
            font-size: 1.0rem;
        }
        .checkout-time {
            bottom: 13px;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        .checkout-time.today {
            color: var(--accent-pink);
            font-weight: bold;
        }
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s, visibility 0.4s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: var(--bg-surface);
            backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid rgba(0, 243, 255, 0.2);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 0;
            transform: scale(0) rotateX(45deg);
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            position: relative;
            overflow: hidden;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1) rotateX(0deg);
        }
        .modal-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--accent-cyan);
        }
        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-label {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .form-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: border 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 30px;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 0;
        }
        .btn-primary {
            background: var(--accent-cyan);
            color: var(--bg-base);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-primary);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 243, 255, 0.3);
        }
        /* 动画定义 */
        @keyframes moon-glow {
            0% { 
                box-shadow: 
                    0 0 30px rgba(248, 248, 255, 0.4),
                    0 0 60px rgba(230, 230, 250, 0.2),
                    inset 0 0 20px rgba(0, 0, 0, 0.1);
            }
            100% { 
                box-shadow: 
                    0 0 40px rgba(248, 248, 255, 0.5),
                    0 0 80px rgba(230, 230, 250, 0.3),
                    inset 0 0 20px rgba(0, 0, 0, 0.1);
            }
        }
        @keyframes sun-pulse {
            0% { 
                box-shadow: 
                    0 0 40px rgba(255, 215, 0, 0.6),
                    0 0 80px rgba(255, 165, 0, 0.3),
                    0 0 120px rgba(255, 69, 0, 0.15);
            }
            100% { 
                box-shadow: 
                    0 0 50px rgba(255, 215, 0, 0.7),
                    0 0 100px rgba(255, 165, 0, 0.4),
                    0 0 150px rgba(255, 69, 0, 0.2);
            }
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        @keyframes nebula-drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(100px, 50px) rotate(360deg); }
        }
        @keyframes title-glow {
            0% { text-shadow: 0 0 15px rgba(100, 100, 100, 0.2); }
            100% { text-shadow: 0 0 30px rgba(100, 100, 100, 0.4); }
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px var(--accent-pink); }
            50% { box-shadow: 0 0 40px var(--accent-pink); }
        }
        /* 响应式 */
        @media (max-width: 1024px) {
            .main-title {
                font-size: 2.3rem;
                margin-top: 200px;
            }
            .dashboard-card {
                flex: 0 0 260px;
                height: 240px;
                padding: 18px;
            }
            .room-cell {
                flex: 0 0 115px;
                height: 115px;
                font-size: 1rem;
            }
            .room-number {
                font-size: 1.2rem;
                top: 7px;
            }
            .room-type {
                font-size: 0.9rem;
                top: 33px;
            }
            .room-status {
                font-size: 0.9rem;
                top: 60px;
            }
            .checkout-time {
                font-size: 0.7rem;
                bottom: 10px;
            }
            .user-name-marker {
                font-size: 0.85rem;
                padding: 3px 10px;
                top: 14px;
            }
            /* 太阳和月亮在平板端微调 */
            .sun {
                width: 60px;
                height: 60px;
                box-shadow: 
                    0 0 35px rgba(255, 215, 0, 0.6),
                    0 0 70px rgba(255, 165, 0, 0.3),
                    0 0 105px rgba(255, 69, 0, 0.15);
            }
            .moon {
                width: 50px;
                height: 50px;
                box-shadow: 
                    0 0 25px rgba(248, 248, 255, 0.4),
                    0 0 50px rgba(230, 230, 250, 0.2),
                    inset 0 0 18px rgba(0, 0, 0, 0.1);
            }
            .stat-item {
                padding: 6px 10px;
                font-size: 0.9rem;
            }
            .stat-value {
                font-size: 1rem;
            }
            .btn {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
        /* 用户名称标记 */
        .user-name-marker {
            position: absolute;
            top: 15px;
            transform: translateX(-50%);
            background: var(--bg-surface);
            border: 1px solid var(--accent-cyan);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            white-space: nowrap;
            color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            animation: user-pulse 3s infinite alternate;
            z-index: 6;
        }
        @keyframes user-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 243, 255, 0.3); }
            50% { box-shadow: 0 0 25px rgba(0, 243, 255, 0.5); }
        }
        @media (max-width: 768px) {
            .main-title {
                font-size: 1.8rem;
                margin-top: 180px;
            }
            .dashboard-container {
                height: 280px;
            }
            .dashboard-card {
                flex: 0 0 220px;
                height: 220px;
            }
            .room-cell {
                flex: 0 0 100px;
                height: 100px;
            }
            .room-number {
                font-size: 1.1rem;
                top: 6px;
            }
            .room-type {
                font-size: 0.8rem;
                top: 29px;
            }
            .room-status {
                font-size: 0.8rem;
                top: 53px;
            }
            .checkout-time {
                font-size: 0.65rem;
                bottom: 8px;
            }
            .floor-title {
                font-size: 1.5rem;
            }
            .stat-item {
                padding: 5px 8px;
                font-size: 0.85rem;
            }
            .stat-value {
                font-size: 0.95rem;
            }
            .btn {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
            /* 太阳和月亮在移动端进一步缩小 */
            .sun {
                width: 50px;
                height: 50px;
                box-shadow: 
                    0 0 30px rgba(255, 215, 0, 0.6),
                    0 0 60px rgba(255, 165, 0, 0.3),
                    0 0 90px rgba(255, 69, 0, 0.15);
            }
            .moon {
                width: 40px;
                height: 40px;
                box-shadow: 
                    0 0 20px rgba(248, 248, 255, 0.4),
                    0 0 40px rgba(230, 230, 250, 0.2),
                    inset 0 0 15px rgba(0, 0, 0, 0.1);
            }
            /* 一键办理按钮在移动端的优化 */
            .dashboard-card .stats-grid {
                gap: 6px !important;
            }
            .dashboard-card .btn {
                padding: 5px 6px !important;
                font-size: 0.8rem !important;
            }
            .user-name-marker {
                font-size: 0.8rem;
                padding: 3px 8px;
                top: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="cosmos-background">
        <div class="moon"></div>
        <div class="sun"></div>
        <div class="time-ruler" id="timeRuler">
            <!-- 时间刻度由JS生成 -->
        </div>
        <div class="stars" id="starsContainer"></div>
        <div class="nebula" style="top: 30%; left: 10%;"></div>
        <div class="nebula" style="bottom: 20%; right: 15%;"></div>
    </div>

    <!-- 主标题 -->
    <h1 class="main-title">旅店前台快捷工作站</h1>

    <!-- 仪表盘 -->
    <section class="dashboard-container">
        <div class="dashboard-scroll" id="dashboardScroll">
            <!-- 房态统计 -->
            <div class="dashboard-card">
                <h2 class="card-title">房态统计</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span>空房</span>
                        <span class="stat-value" id="emptyRooms">12</span>
                    </div>
                    <div class="stat-item info">
                        <span>已入住</span>
                        <span class="stat-value" id="occupiedRooms">45</span>

            <h2 class="modal-title" id="modalTitle">入住登记</h2>

    <!-- JavaScript -->
    <script>
        // 初始化Lucide图标
        lucide.createIcons();

        // 时间刻度生成
        function renderTimeRuler() {
            const ruler = document.getElementById('timeRuler');
            ruler.innerHTML = '';
            
            // 生成小时刻度（24个）
            for (let hour = 0; hour < 24; hour++) {
                const tick = document.createElement('div');
                tick.className = 'time-tick hour';
                const minutePos = hour * 60;
                const timePercent = minutePos / (24 * 60);
                tick.style.left = `${15 + timePercent * 70}%`;
                ruler.appendChild(tick);
            }
            
            // 生成10分钟刻度（每小时10,20,30,40,50分）
            for (let hour = 0; hour < 24; hour++) {
                for (let minuteOffset = 1; minuteOffset <= 5; minuteOffset++) {
                    const tick = document.createElement('div');
                    tick.className = 'time-tick';
                    const minutePos = hour * 60 + minuteOffset * 10;
                    const timePercent = minutePos / (24 * 60);
                    tick.style.left = `${15 + timePercent * 70}%`;
                    ruler.appendChild(tick);
                }
            }
            
            // 当前时间标记（包含用户信息）
            const now = new Date();
            const hour = now.getHours();
            const minute = now.getMinutes();
            const timePercent = (hour * 60 + minute) / (24 * 60);
            const marker = document.createElement('div');
            marker.className = 'current-time-marker';
            marker.style.left = `${15 + timePercent * 70}%`;
            marker.textContent = now.getFullYear() + '/' + 
                                String(now.getMonth()+1).padStart(2,'0') + '/' + 
                                String(now.getDate()).padStart(2,'0') + ' ' + 
                                String(hour).padStart(2,'0') + ':' + 
                                String(minute).padStart(2,'0') + ' | 张三';
            ruler.appendChild(marker);
        }

        // 星空生成（避开太阳、月亮及光晕区域）
        function createStars() {
            const container = document.getElementById('starsContainer');
            // 禁区定义：太阳和月亮区域（中心坐标%，半径%）
            const forbiddenZones = [
                { cx: 95, cy: 5, r: 6 },   // 太阳（右5%，上5%），含光晕半径约6%
                { cx: 5, cy: 5, r: 4.5 }     // 月亮（左5%，上5%），含光晕半径约4.5%
            ];
            
            function isInForbiddenZone(x, y) {
                for (const zone of forbiddenZones) {
                    const distance = Math.sqrt(Math.pow(x - zone.cx, 2) + Math.pow(y - zone.cy, 2));
                    if (distance < zone.r) return true;
                }
                return false;
            }
            
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = Math.random() * 3 + 1 + 'px';
                
                // 生成不在禁区内的随机位置（最多尝试10次）
                let x, y;
                let attempts = 0;
                do {
                    x = Math.random() * 100;
                    y = Math.random() * 100;
                    attempts++;
                } while (isInForbiddenZone(x, y) && attempts < 10);
                
                star.style.left = `${x}%`;
                star.style.top = `${y}%`;
                const duration = Math.random() * 5 + 3;
                const delay = Math.random() * 5;
                star.style.setProperty('--duration', `${duration}s`);
                star.style.setProperty('--delay', `${delay}s`);
                container.appendChild(star);
            }
        }

        // 房间数据定义
        const floors = [
            { name: '一楼', rooms: 20, start: 1001 },
            { name: '二楼', rooms: 18, start: 2001 },
            { name: '三楼', rooms: 24, start: 3001 },
            { name: '四楼', rooms: 16, start: 4001 },
            { name: '五楼', rooms: 20, start: 5001 },
            { name: '六楼', rooms: 18, start: 6001 }
        ];
        const roomStatus = ['empty', 'occupied', 'dirty', 'cleaned', 'maintenance', 'financial-issue'];

        // 辅助函数：获取状态文本
        function getStatusText(status) {
            const map = {
                'empty': '空房',
                'occupied': '已入住',
                'dirty': '脏房',
                'cleaned': '已打扫',
                'maintenance': '维修',
                'financial-issue': '账务异常'
            };
            return map[status] || status;
        }

        // 辅助函数：生成退房时间文本
        function generateCheckoutText(status) {
            if (status === 'empty') {
                return '';
            }
            if (status === 'maintenance') {
                return '';
            }
            // 随机生成0-6天后的退房时间
            const daysOffset = Math.floor(Math.random() * 7);
            const hour = 8 + Math.floor(Math.random() * 14); // 8-22点
            const minute = Math.random() < 0.5 ? 0 : 30;
            const now = new Date();
            const targetDate = new Date(now);
            targetDate.setDate(now.getDate() + daysOffset);
            targetDate.setHours(hour, minute, 0, 0);
            const dayDiff = daysOffset;
            let dayLabel = '';
            if (dayDiff === 0) {
                dayLabel = '今天';
            } else if (dayDiff === 1) {
                dayLabel = '明天';
            } else if (dayDiff === 2) {
                dayLabel = '后天';
            } else {
                const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                dayLabel = weekdays[targetDate.getDay()];
            }
            return `${dayLabel}${hour}时${minute.toString().padStart(2, '0')}分`;
        }

        // 辅助函数：判断是否为今天
        function isToday(checkoutText) {
            return checkoutText.includes('今天');
        }

        // 生成房态矩阵
        function renderRoomMatrix() {
            const roomTypes = ['标间', '大床', '套间'];
            const container = document.getElementById('roomMatrix');
            container.innerHTML = '';
            floors.forEach(floor => {
                const floorDiv = document.createElement('div');
                floorDiv.className = 'floor-row';
                const title = document.createElement('h3');
                title.className = 'floor-title';
                title.textContent = floor.name;
                floorDiv.appendChild(title);
                for (let i = 0; i < floor.rooms; i++) {
                    const roomNum = floor.start + i;
                    const status = roomStatus[Math.floor(Math.random() * roomStatus.length)];
                    const roomType = roomTypes[Math.floor(Math.random() * roomTypes.length)];
                    const checkoutText = generateCheckoutText(status);
                    const cell = document.createElement('div');
                    cell.className = `room-cell ${status}`;
                    cell.innerHTML = `
                        <div class="room-number">${roomNum}</div>
                        <div class="room-type">${roomType}</div>
                        <div class="room-status">${getStatusText(status)}</div>
                        ${checkoutText ? `<div class="checkout-time ${isToday(checkoutText) ? 'today' : ''}">${checkoutText}</div>` : ''}
                    `;
                    cell.dataset.room = roomNum;
                    cell.dataset.status = status;
                    cell.dataset.type = roomType;
                    cell.addEventListener('click', () => handleRoomClick(roomNum, status));
                    floorDiv.appendChild(cell);
                }
                container.appendChild(floorDiv);
            });
        }

        // 房间点击处理
        function handleRoomClick(roomNum, status) {
            let modalType = 'order'; // 默认订单处理
            if (status === 'empty') modalType = 'checkin';
            else if (status === 'maintenance') modalType = 'maintenance';
            openModal(modalType, roomNum);
        }

        // 弹窗控制
        let currentModalType = '';
        let currentRoom = '';
        function openModal(type, room = '') {
            currentModalType = type;
            currentRoom = room;
            const overlay = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const form = document.getElementById('modalForm');
            form.innerHTML = '';
            // 根据类型生成表单
            switch(type) {
                case 'checkin':
                    title.textContent = `入住登记 - 房间 ${room}`;
                    form.innerHTML = `
                        <div class="form-group">
                            <label class="form-label">客人姓名</label>
                            <input type="text" class="form-input" placeholder="请输入姓名" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">证件号码</label>
                            <input type="text" class="form-input" placeholder="身份证/护照号码" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">联系电话</label>
                            <input type="tel" class="form-input" placeholder="手机号码" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">入住天数</label>
                            <input type="number" class="form-input" placeholder="1" min="1" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">预付押金</label>
                            <input type="number" class="form-input" placeholder="500" min="0" required>
                        </div>
                    `;
                    break;
                case 'checkout':
                    title.textContent = `离店结算 - 房间 ${room}`;
                    form.innerHTML = `
                        <div class="form-group">
                            <label class="form-label">房间号</label>
                            <input type="text" class="form-input" value="${room}" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">总消费</label>
                            <input type="number" class="form-input" placeholder="0" min="0" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">已付押金</label>
                            <input type="number" class="form-input" placeholder="0" min="0" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">找零/补收</label>
                            <input type="number" class="form-input" placeholder="0" required>
                        </div>
                    `;
                    break;
                case 'maintenance':
                    title.textContent = `修改房态 - 房间 ${room}`;
                    form.innerHTML = `
                        <div class="form-group">
                            <label class="form-label">房间号</label>
                            <input type="text" class="form-input" value="${room}" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">维修原因</label>
                            <select class="form-input">
                                <option>设备故障</option>
                                <option>装修维护</option>
                                <option>清洁问题</option>
                                <option>其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">预计完成时间</label>
                            <input type="datetime-local" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">备注</label>
                            <textarea class="form-input" rows="3"></textarea>
                        </div>
                    `;
                    break;
                case 'order':
                    title.textContent = `订单处理 - 房间 ${room}`;
                    form.innerHTML = `
                        <div class="form-group">
                            <label class="form-label">房间号</label>
                            <input type="text" class="form-input" value="${room}" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">当前状态</label>
                            <input type="text" class="form-input" value="${status}" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">操作</label>
                            <select class="form-input">
                                <option>转为空房</option>
                                <option>转为脏房</option>
                                <option>转为已打扫</option>
                                <option>标记维修</option>
                                <option>标记账务异常</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">备注</label>
                            <textarea class="form-input" rows="3"></textarea>
                        </div>
                    `;
                    break;
                default:
                    title.textContent = '功能暂未实现';
                    form.innerHTML = `<p>此功能正在开发中...</p>`;
            }
            overlay.classList.add('active');
            // 触发弧形轨迹动画（简化版）
            const modal = document.querySelector('.modal-content');
            modal.style.transform = 'scale(0) rotateX(45deg)';
            setTimeout(() => {
                modal.style.transform = 'scale(1) rotateX(0deg)';
            }, 10);
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function submitForm() {
            alert('表单提交成功（模拟）');
            closeModal();
        }

        // 交接班功能
        function startHandover(type) {
            const action = type === 'handoff' ? '交班' : '接班';
            openModal('handover');
            // 实际应用中这里会调用API
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderTimeRuler();
            createStars();
            renderRoomMatrix();
            // 仪表盘滚动效果
            const scroll = document.getElementById('dashboardScroll');
            let isDown = false;
            let startX;
            let scrollLeft;
            scroll.addEventListener('mousedown', (e) => {
                isDown = true;
                startX = e.pageX - scroll.offsetLeft;
                scrollLeft = scroll.scrollLeft;
            });
            scroll.addEventListener('mouseleave', () => isDown = false);
            scroll.addEventListener('mouseup', () => isDown = false);
            scroll.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - scroll.offsetLeft;
                const walk = (x - startX) * 2;
                scroll.scrollLeft = scrollLeft - walk;
            });
            // 初始化仪表盘导航
            initDashboardNav();
        });

        // 每秒更新时间标记
        setInterval(renderTimeRuler, 60000);

        // 仪表盘导航初始化
        function initDashboardNav() {
            const scroll = document.getElementById('dashboardScroll');
            const arrowLeft = document.getElementById('dashboardArrowLeft');
            const arrowRight = document.getElementById('dashboardArrowRight');
            const dotsContainer = document.getElementById('dashboardDots');
            
            if (!scroll || !arrowLeft || !arrowRight || !dotsContainer) return;

            const cards = scroll.querySelectorAll('.dashboard-card');
            const cardCount = cards.length;
            if (cardCount === 0) return;

            // 计算每张卡片的滚动偏移量（宽度 + 间距）
            const firstCard = cards[0];
            const cardStyle = window.getComputedStyle(firstCard);
            const cardWidth = firstCard.offsetWidth;
            const gap = parseInt(window.getComputedStyle(scroll).gap) || 12;
            const cardStep = cardWidth + gap;

            // 生成锚点
            dotsContainer.innerHTML = '';
            for (let i = 0; i < cardCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'dashboard-dot';
                dot.dataset.index = i;
                dot.addEventListener('click', () => {
                    scrollToIndex(i);
                });
                dotsContainer.appendChild(dot);
            }

            // 滚动到指定索引
            function scrollToIndex(index) {
                const scrollLeft = index * cardStep;
                scroll.scrollTo({
                    left: scrollLeft,
                    behavior: 'smooth'
                });
                updateNavState();
            }

            // 更新导航状态（箭头、锚点）
            function updateNavState() {
                const scrollPos = scroll.scrollLeft;
                const maxScroll = scroll.scrollWidth - scroll.clientWidth;
                
                // 更新箭头状态
                arrowLeft.disabled = scrollPos <= 0;
                arrowRight.disabled = scrollPos >= maxScroll - 1; // 容差

                // 更新锚点状态
                const currentIndex = Math.round(scrollPos / cardStep);
                const dots = dotsContainer.querySelectorAll('.dashboard-dot');
                dots.forEach((dot, idx) => {
                    dot.classList.toggle('active', idx === currentIndex);
                });
            }

            // 箭头点击事件
            arrowLeft.addEventListener('click', () => {
                scroll.scrollBy({
                    left: -cardStep,
                    behavior: 'smooth'
                });
            });
            arrowRight.addEventListener('click', () => {
                scroll.scrollBy({
                    left: cardStep,
                    behavior: 'smooth'
                });
            });

            // 滚动事件监听
            let scrollTimeout;
            scroll.addEventListener('scroll', () => {
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(updateNavState, 100);
            });

            // 初始化状态
            updateNavState();
        }


    </script>
