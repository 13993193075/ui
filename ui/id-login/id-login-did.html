<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统一身份认证平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #151522 50%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
            inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                    from 0deg,
                    transparent,
                    rgba(138, 43, 226, 0.2),
                    transparent 30%
            );
            animation: rotate 10s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #8a2be2, #9370db, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .logo p {
            color: #a0a0c0;
            font-size: 1rem;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 28px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #b0b0e0;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #8a2be2;
            font-size: 1.2rem;
            z-index: 2;
        }

        .form-input {
            width: 100%;
            padding: 18px 20px 18px 50px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #fff;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #8a2be2;
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .wallet-select {
            width: 100%;
            padding: 18px 20px 18px 50px;
            background: rgba(125, 120, 120, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #dff5b5;
            font-size: 1.1rem;
            appearance: none;
            cursor: pointer;
            outline: none;
        }
        .wallet-select-option {
            background-color: #323232;
        }

        .wallet-select:focus {
            border-color: #8a2be2;
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .select-arrow {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0a0c0;
            font-size: 1.2rem;
            pointer-events: none;
        }

        .login-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(90deg, #8a2be2, #9370db);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(138, 43, 226, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 35px 0;
            color: #a0a0c0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .divider span {
            padding: 0 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .auth-methods {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .auth-method {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 18%;
        }

        .auth-method:hover {
            transform: translateY(-5px);
        }

        .method-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .auth-method:hover .method-icon {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(138, 43, 226, 0.5);
            box-shadow: 0 8px 16px rgba(138, 43, 226, 0.2);
        }

        .method-label {
            font-size: 0.85rem;
            color: #b0b0e0;
            text-align: center;
            font-weight: 500;
        }

        .userid .method-icon { color: #00d2ff; }
        .phone .method-icon { color: #3a7bd5; }
        .email .method-icon { color: #ff9500; }
        .wechat .method-icon { color: #07c160; }
        .alipay .method-icon { color: #1677ff; }

        .active-method {
            position: relative;
        }

        .active-method::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #8a2be2;
            box-shadow: 0 0 10px #8a2be2;
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: #a0a0c0;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #8a2be2;
            text-decoration: underline;
        }

        .hint {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #a0a0c0;
        }

        .hint a {
            color: #8a2be2;
            text-decoration: none;
        }

        .hint a:hover {
            text-decoration: underline;
        }

        .wallet-info {
            display: flex;
            align-items: center;
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .wallet-icon {
            font-size: 1.5rem;
            color: #8a2be2;
            margin-right: 15px;
        }

        .wallet-details {
            flex: 1;
        }

        .wallet-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 5px;
        }

        .wallet-address {
            font-size: 0.9rem;
            color: #a0a0c0;
            font-family: monospace;
            word-break: break-all;
        }

        .signature-status {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .status-icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .status-text {
            font-size: 1rem;
            color: #b0b0e0;
            margin-bottom: 10px;
        }

        .status-detail {
            font-size: 0.9rem;
            color: #a0a0c0;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 40px 25px;
                border-radius: 20px;
            }
            .auth-methods {
                flex-wrap: wrap;
                justify-content: center;
                gap: 20px;
            }
            .auth-method {
                width: 45%;
            }
            .wallet-info {
                flex-direction: column;
                text-align: center;
            }
            .wallet-icon {
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <h1>DID登录</h1>
        <p>-- 统一身份认证平台 --</p >
    </div>

    <form id="blockchainLoginForm">
        <div class="form-group">
            <label class="form-label">选择钱包</label>
            <div class="input-wrapper">
                <i class="input-icon fas fa-wallet"></i>
                <select class="wallet-select" id="walletSelect" required>
                    <option class="wallet-select-option" value="">选择你的Web3钱包</option>
                    <option class="wallet-select-option" value="metamask">MetaMask</option>
                    <option class="wallet-select-option" value="trustwallet">Trust Wallet</option>
                    <option class="wallet-select-option" value="coinbase">Coinbase Wallet</option>
                    <option class="wallet-select-option" value="phantom">Phantom</option>
                    <option class="wallet-select-option" value="keplr">Keplr</option>
                    <option class="wallet-select-option" value="other">其他钱包</option>
                </select>
                <i class="select-arrow fas fa-chevron-down"></i>
            </div>
            <div class="hint">请确保已安装相应的钱包浏览器扩展</div>
        </div>

        <div class="form-group">
            <label class="form-label">DID地址</label>
            <div class="input-wrapper">
                <i class="input-icon fas fa-link"></i>
                <input type="text" class="form-input" id="didAddress" placeholder="did:ethr:0x..." readonly>
            </div>
            <div class="hint">连接钱包后自动填充</div>
        </div>

        <div class="wallet-info" id="walletInfo" style="display: none;">
            <div class="wallet-icon">
                <i class="fas fa-wallet"></i>
            </div>
            <div class="wallet-details">
                <div class="wallet-name" id="walletName">未连接</div>
                <div class="wallet-address" id="walletAddress">0x0000...0000</div>
            </div>
        </div>

        <div class="signature-status" id="signatureStatus">
            <div class="status-icon">
                <i class="fas fa-signature"></i>
            </div>
            <div class="status-text" id="statusText">等待签名</div>
            <div class="status-detail" id="statusDetail">请在钱包中确认签名请求</div>
        </div>

        <button type="button" class="login-btn" id="connectBtn">
            <i class="fas fa-plug"></i> 连接钱包
        </button>

        <button type="submit" class="login-btn" id="loginBtn" style="display: none; margin-top: 15px;">
            <i class="fas fa-sign-in-alt"></i> 签名登录
        </button>
    </form>

    <div class="divider">
        <span>其它登录方式</span>
    </div>

    <div class="auth-methods">
        <div class="auth-method userid active-method" data-method="userid">
            <div class="method-icon">
                <i class="fas fa-user"></i>
            </div>
            <span class="method-label">用户ID</span>
        </div>
        <div class="auth-method phone" data-method="phone">
            <div class="method-icon">
                <i class="fas fa-mobile-alt"></i>
            </div>
            <span class="method-label">手机</span>
        </div>
        <div class="auth-method email" data-method="email">
            <div class="method-icon">
                <i class="fas fa-envelope"></i>
            </div>
            <span class="method-label">Email</span>
        </div>
        <div class="auth-method wechat" data-method="wechat">
            <div class="method-icon">
                <i class="fab fa-weixin"></i>
            </div>
            <span class="method-label">微信</span>
        </div>
        <div class="auth-method alipay" data-method="alipay">
            <div class="method-icon">
                <i class="fab fa-alipay"></i>
            </div>
            <span class="method-label">支付宝</span>
        </div>
    </div>

    <div class="footer-links">
        <a href=" "><i class="fas fa-question-circle"></i> 帮助中心</a >
        <a href="#"><i class="fas fa-user-plus"></i> 注册新账号</a >
        <a href="#"><i class="fas fa-shield-alt"></i> 隐私政策</a >
    </div>
</div>

<script>
    // 模拟钱包数据
    const wallets = {
        metamask: { name: 'MetaMask', icon: 'fab fa-ethereum' },
        trustwallet: { name: 'Trust Wallet', icon: 'fas fa-shield-alt' },
        coinbase: { name: 'Coinbase Wallet', icon: 'fas fa-coins' },
        phantom: { name: 'Phantom', icon: 'fas fa-ghost' },
        keplr: { name: 'Keplr', icon: 'fas fa-atom' },
        other: { name: '其他钱包', icon: 'fas fa-wallet' }
    };

    // DOM元素
    const walletSelect = document.getElementById('walletSelect');
    const didAddressInput = document.getElementById('didAddress');
    const walletInfo = document.getElementById('walletInfo');
    const walletName = document.getElementById('walletName');
    const walletAddress = document.getElementById('walletAddress');
    const signatureStatus = document.getElementById('signatureStatus');
    const statusText = document.getElementById('statusText');
    const statusDetail = document.getElementById('statusDetail');
    const connectBtn = document.getElementById('connectBtn');
    const loginBtn = document.getElementById('loginBtn');

    let connected = false;
    let selectedWallet = '';
    let mockAddress = '';

    // 生成模拟地址
    function generateMockAddress() {
        const chars = '0123456789abcdef';
        let address = '0x';
        for (let i = 0; i < 40; i++) {
            address += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return address;
    }

    // 连接钱包
    connectBtn.addEventListener('click', () => {
        selectedWallet = walletSelect.value;

        if (!selectedWallet) {
            Swal.fire({
                title: '提示',
                text: '请选择钱包类型',
                icon: 'warning',
                confirmButtonText: '知道了',
                background: '#1a1a2e',
                color: '#fff'
            });
            return;
        }

        // 模拟连接过程
        connectBtn.disabled = true;
        connectBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 连接中...';

        setTimeout(() => {
            connected = true;
            mockAddress = generateMockAddress();
            const wallet = wallets[selectedWallet];

            // 更新UI
            walletName.textContent = wallet.name;
            walletAddress.textContent = mockAddress;
            didAddressInput.value = `did:ethr:${mockAddress}`;
            walletInfo.style.display = 'flex';

            connectBtn.style.display = 'none';
            loginBtn.style.display = 'block';

            // 重置连接按钮
            connectBtn.disabled = false;
            connectBtn.innerHTML = '<i class="fas fa-plug"></i> 连接钱包';

            Swal.fire({
                title: '钱包连接成功',
                text: `${wallet.name} 已连接`,
                icon: 'success',
                confirmButtonText: '知道了',
                background: '#1a1a2e',
                color: '#fff'
            });
        }, 1500);
    });

    // 签名登录
    loginBtn.addEventListener('click', () => {
        if (!connected) {
            Swal.fire({
                title: '提示',
                text: '请先连接钱包',
                icon: 'warning',
                confirmButtonText: '知道了',
                background: '#1a1a2e',
                color: '#fff'
            });
            return;
        }

        // 显示签名状态
        signatureStatus.style.display = 'block';
        statusText.textContent = '等待签名';
        statusDetail.textContent = '请在钱包中确认签名请求';
        statusIcon.className = 'fas fa-signature';
        statusIcon.style.color = '#8a2be2';

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 等待签名...';

        // 模拟签名过程
        setTimeout(() => {
            // 模拟签名成功
            statusText.textContent = '签名成功';
            statusDetail.textContent = '验证身份信息...';
            statusIcon.className = 'fas fa-check-circle';
            statusIcon.style.color = '#34c759';

            setTimeout(() => {
                statusText.textContent = '登录成功';
                statusDetail.textContent = '正在跳转到用户中心...';
                statusIcon.className = 'fas fa-user-check';
                statusIcon.style.color = '#34c759';

                loginBtn.innerHTML = '<i class="fas fa-check"></i> 登录成功';
                loginBtn.style.background = 'linear-gradient(90deg, #34c759, #2ecc71)';

                // alert('登录成功！欢迎回来。');
                setTimeout(() => {
                    Swal.fire({
                        title: '提示',
                        text: '登录成功！欢迎回来。',
                        icon: 'success',
                        confirmButtonText: '进入应用',
                        background: '#1a1a2e',
                        color: '#fff'
                    });
                }, 1000);
            }, 1000);
        }, 2000);
    });

    // 切换登录方式
    const authMethods = document.querySelectorAll('.auth-method');
    authMethods.forEach(method => {
        method.addEventListener('click', () => {
            // 移除所有active
            authMethods.forEach(m => m.classList.remove('active-method'));
            // 添加active
            method.classList.add('active-method');

            const methodType = method.getAttribute('data-method');
            let methodTypeText = '';
            if(methodType === 'userid') {
                methodTypeText = '用户ID';
            } else if(methodType === 'phone') {
                methodTypeText = '手机';
            } else if(methodType === 'email') {
                methodTypeText = 'Email';
            } else if(methodType === 'wechat') {
                methodTypeText = '微信';
            } else if(methodType === 'alipay') {
                methodTypeText = '支付宝';
            }
            console.log(`切换到 ${methodTypeText} 登录`);
            if (methodType !== 'blockchain') {
                Swal.fire({
                    title: '提示',
                    text: `切换到 ${methodTypeText} 登录`,
                    icon: 'warning',
                    confirmButtonText: '知道了',
                    background: '#1a1a2e',
                    color: '#fff'
                });
            }
        });
    });

    // 钱包选择变化
    walletSelect.addEventListener('change', () => {
        if (connected) {
            // 如果已连接，断开连接
            connected = false;
            walletInfo.style.display = 'none';
            loginBtn.style.display = 'none';
            connectBtn.style.display = 'block';
            signatureStatus.style.display = 'none';
            didAddressInput.value = '';
        }
    });
</script>
