<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统一身份认证平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #151522 50%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(22, 119, 255, 0.2),
                transparent 30%
            );
            animation: rotate 10s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .logo {
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #1677ff, #4096ff, #1677ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .logo p {
            color: #a0a0c0;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .qr-section {
            margin: 30px 0;
        }

        .qr-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 240px;
            height: 240px;
            margin: 0 auto 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .qr-code {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #1677ff, #4096ff);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .qr-code::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(90deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%),
                linear-gradient(0deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%);
            background-size: 20px 20px;
            border-radius: 12px;
        }

        .qr-code::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%231677ff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>');
            background-size: 30px;
            background-position: center;
            background-repeat: no-repeat;
        }

        .qr-instruction {
            color: #b0b0e0;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .qr-steps {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            padding: 20px;
            margin: 25px 0;
            text-align: left;
        }

        .qr-step {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            color: #fff;
        }

        .qr-step:last-child {
            margin-bottom: 0;
        }

        .step-number {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #1677ff, #4096ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .step-text {
            flex: 1;
        }

        .refresh-btn {
            background: linear-gradient(90deg, #1677ff, #4096ff);
            border: none;
            border-radius: 16px;
            color: white;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(22, 119, 255, 0.3);
        }

        .refresh-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(22, 119, 255, 0.4);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-indicator {
            margin-top: 25px;
            padding: 15px;
            background: rgba(22, 119, 255, 0.1);
            border-radius: 12px;
            border-left: 4px solid #1677ff;
        }

        .status-text {
            color: #a0a0c0;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status-text i {
            color: #1677ff;
        }

        .alipay-app-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1677ff, #4096ff);
            border-radius: 20px;
            margin: 30px auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 10px 20px rgba(22, 119, 255, 0.3);
        }

        .alipay-app-icon i {
            color: white;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 35px 0;
            color: #a0a0c0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .divider span {
            padding: 0 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .auth-methods {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .auth-method {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 18%;
        }

        .auth-method:hover {
            transform: translateY(-5px);
        }

        .method-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .auth-method:hover .method-icon {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgb(22, 119, 255);
            box-shadow: 0 8px 16px rgba(7, 96, 193, 0.2);
        }

        .method-label {
            font-size: 0.85rem;
            color: #b0b0e0;
            text-align: center;
            font-weight: 500;
        }

        .userid .method-icon { color: #00d2ff; }
        .phone .method-icon { color: #3a7bd5; }
        .email .method-icon { color: #ff9500; }
        .wechat .method-icon { color: #07c160; }
        .blockchain .method-icon { color: #8a2be2; }

        .active-method {
            position: relative;
        }

        .active-method::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #1677ff;
            box-shadow: 0 0 10px #1677ff;
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: #a0a0c0;
            text-decoration: none;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .footer-links a:hover {
            color: #1677ff;
            text-decoration: underline;
        }

        .timer {
            font-size: 0.9rem;
            color: #a0a0c0;
            margin-top: 15px;
        }

        .timer span {
            color: #1677ff;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 25px;
                border-radius: 20px;
            }
            
            .qr-container {
                width: 200px;
                height: 200px;
            }
            
            .alipay-app-icon {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
            
            .footer-links {
                flex-direction: column;
                gap: 15px;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>支付宝登录</h1>
            <p>-- 统一身份认证平台 --</p>
        </div>

        <div class="alipay-app-icon">
            <i class="fab fa-alipay"></i>
        </div>

        <div class="qr-section">
            <div class="qr-instruction">
                请使用手机支付宝App扫描二维码
            </div>

            <div class="qr-container">
                <div class="qr-code" id="qrCode"></div>
            </div>

            <div class="timer">
                二维码有效期：<span id="timer">60</span>秒
            </div>

            <div class="qr-steps">
                <div class="qr-step">
                    <div class="step-number">1</div>
                    <div class="step-text">打开手机支付宝App</div>
                </div>
                <div class="qr-step">
                    <div class="step-number">2</div>
                    <div class="step-text">点击首页右上角"+"号</div>
                </div>
                <div class="qr-step">
                    <div class="step-number">3</div>
                    <div class="step-text">选择"扫一扫"扫描二维码</div>
                </div>
                <div class="qr-step">
                    <div class="step-number">4</div>
                    <div class="step-text">在手机上确认登录</div>
                </div>
            </div>

            <div class="status-indicator">
                <div class="status-text" id="statusText">
                    <i class="fas fa-sync-alt fa-spin"></i>
                    <span>等待扫码...</span>
                </div>
            </div>

            <button class="refresh-btn" id="refreshBtn">
                <i class="fas fa-redo"></i>
                刷新二维码
            </button>
        </div>

        <div class="divider">
            <span>其它登录方式</span>
        </div>

        <div class="auth-methods">
            <div class="auth-method userid active-method" data-method="userid">
                <div class="method-icon">
                    <i class="fas fa-user"></i>
                </div>
                <span class="method-label">用户ID</span>
            </div>
            <div class="auth-method phone" data-method="phone">
                <div class="method-icon">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <span class="method-label">手机</span>
            </div>
            <div class="auth-method email" data-method="email">
                <div class="method-icon">
                    <i class="fas fa-envelope"></i>
                </div>
                <span class="method-label">Email</span>
            </div>
            <div class="auth-method wechat" data-method="wechat">
                <div class="method-icon">
                    <i class="fab fa-weixin"></i>
                </div>
                <span class="method-label">微信</span>
            </div>
            <div class="auth-method blockchain" data-method="blockchain">
                <div class="method-icon">
                    <i class="fas fa-link"></i>
                </div>
                <span class="method-label">DID</span>
            </div>
        </div>

        <div class="footer-links">
            <a href="#"><i class="fas fa-question-circle"></i> 帮助中心</a>
            <a href="#"><i class="fas fa-shield-alt"></i> 注册新账号</a>
            <a href="#"><i class="fas fa-mobile-alt"></i> 隐私政策</a>
        </div>
    </div>

    <script>
        // 模拟二维码状态
        let qrTimer = 60;
        let qrActive = true;
        let timerInterval;

        // 初始化
        function initQRCode() {
            updateStatus('等待扫码...', 'fas fa-sync-alt fa-spin', '#1677ff');
            startTimer();
        }

        // 更新状态
        function updateStatus(text, icon, color = '#1677ff') {
            const statusText = document.getElementById('statusText');
            statusText.innerHTML = `<i class="${icon}"></i><span>${text}</span>`;
            statusText.style.color = color;
            
            const statusIndicator = document.querySelector('.status-indicator');
            statusIndicator.style.borderLeftColor = color;
            statusIndicator.style.background = color === '#1677ff' 
                ? 'rgba(22, 119, 255, 0.1)' 
                : color === '#34c759' 
                    ? 'rgba(52, 199, 89, 0.1)'
                    : 'rgba(255, 149, 0, 0.1)';
        }

        // 开始倒计时
        function startTimer() {
            clearInterval(timerInterval);
            qrTimer = 60;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                qrTimer--;
                updateTimerDisplay();
                
                if (qrTimer <= 0) {
                    clearInterval(timerInterval);
                    qrActive = false;
                    updateStatus('二维码已过期', 'fas fa-exclamation-triangle', '#ff9500');
                    document.getElementById('refreshBtn').disabled = false;
                }
            }, 1000);
        }

        // 更新计时器显示
        function updateTimerDisplay() {
            document.getElementById('timer').textContent = qrTimer;
        }

        // 模拟扫码成功
        function simulateScanSuccess() {
            if (!qrActive) return;
            
            clearInterval(timerInterval);
            qrActive = false;
            
            updateStatus('扫码成功，正在登录...', 'fas fa-check-circle', '#34c759');
            
            setTimeout(() => {
                Swal.fire({
                    title: '提示',
                    text: '登录成功！欢迎回来。',
                    icon: 'success',
                    confirmButtonText: '进入应用',
                    background: '#1a1a2e',
                    color: '#fff'
                }).then(() => {
                    // 重置状态
                    initQRCode();
                });
            }, 1500);
        }

        // 刷新二维码
        function refreshQRCode() {
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 刷新中...';
            refreshBtn.disabled = true;
            
            setTimeout(() => {
                qrActive = true;
                initQRCode();
                refreshBtn.innerHTML = '<i class="fas fa-redo"></i> 刷新二维码';
                refreshBtn.disabled = false;
                
                Swal.fire({
                    title: '二维码已刷新',
                    text: '请使用新的二维码扫码登录',
                    icon: 'info',
                    confirmButtonText: '知道了',
                    background: '#1a1a2e',
                    color: '#fff'
                });
            }, 1000);
        }

        // 事件监听
        document.getElementById('refreshBtn').addEventListener('click', refreshQRCode);

        // 模拟点击二维码触发扫码（演示用）
        document.getElementById('qrCode').addEventListener('click', () => {
            if (qrActive) {
                Swal.fire({
                    title: '模拟扫码',
                    text: '是否模拟支付宝扫码登录？',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: '模拟扫码',
                    cancelButtonText: '取消',
                    background: '#1a1a2e',
                    color: '#fff'
                }).then((result) => {
                    if (result.isConfirmed) {
                        simulateScanSuccess();
                    }
                });
            }
        });

        // 切换登录方式
        const authMethods = document.querySelectorAll('.auth-method');
        authMethods.forEach(method => {
            method.addEventListener('click', () => {
                // 移除所有active
                authMethods.forEach(m => m.classList.remove('active-method'));
                // 添加active
                method.classList.add('active-method');

                const methodType = method.getAttribute('data-method');
                let methodTypeText = '';
                if(methodType === 'userid') {
                    methodTypeText = '用户ID';
                } else if(methodType === 'phone') {
                    methodTypeText = '手机';
                } else if(methodType === 'email') {
                    methodTypeText = 'Email';
                } else if(methodType === 'wechat') {
                    methodTypeText = '微信';
                } else if(methodType === 'blockchain') {
                    methodTypeText = 'DID';
                }
                console.log(`切换到 ${methodTypeText} 登录`);

                if (methodType !== 'alipay') {
                    Swal.fire({
                        title: '提示',
                        text: `切换到 ${methodTypeText} 登录`,
                        icon: 'warning',
                        confirmButtonText: '知道了',
                        background: '#1a1a2e',
                        color: '#fff'
                    });
                }
            });
        });

        // 初始化
        initQRCode();

        // 自动模拟扫码（演示用，5秒后自动触发）
        setTimeout(() => {
            if (qrActive && Math.random() > 0.5) {
                console.log('演示：自动模拟扫码登录');
                // simulateScanSuccess();
            }
        }, 5000);
    </script>
</body>
</html>
